<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Controle de Gastos</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:#0c1220;color:#e2e8f0;min-height:100dvh;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
input,button,select{font-family:inherit;font-size:14px}
input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
button{cursor:pointer}
.app{max-width:540px;margin:0 auto;padding-bottom:80px}
.top-bar{position:sticky;top:0;z-index:20;background:#0c1220;padding:14px 16px 10px;border-bottom:1px solid rgba(148,163,184,.08)}
.logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sync{font-size:11px;margin-left:auto}
.top-row{display:flex;align-items:center;gap:8px}
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(12,18,32,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(148,163,184,.08);display:flex;justify-content:center;padding:4px 0 max(4px,env(safe-area-inset-bottom))}
.bnav-in{display:flex;max-width:540px;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
.bnav-in::-webkit-scrollbar{display:none}
.nb{flex:0 0 auto;width:11.11%;display:flex;flex-direction:column;align-items:center;gap:1px;background:none;border:none;color:#475569;font-size:8px;font-weight:500;padding:4px 1px;min-width:0}
.nb .ico{font-size:16px;line-height:1}
.nb.on{color:#f8fafc}
.page{display:none;flex-direction:column;gap:10px;padding:10px 16px}
.page.show{display:flex}
.trow{display:flex;gap:6px;flex-wrap:wrap}
.tb{flex:1;padding:9px 8px;background:rgba(22,32,50,.8);border:1px solid rgba(148,163,184,.1);border-radius:10px;color:#64748b;font-size:12px;font-weight:500;text-align:center;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb.on{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.3);color:#f8fafc}
.inp{width:100%;padding:10px 12px;background:rgba(12,18,32,.7);border:1px solid rgba(148,163,184,.1);border-radius:10px;color:#f8fafc;font-size:14px;outline:none}
.inp:focus{border-color:rgba(96,165,250,.4)}
.inp-m{padding-left:30px}
.mw{position:relative;flex:1}
.mw .sy{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#475569;font-size:13px;font-weight:600;pointer-events:none}
.row{display:flex;gap:8px;align-items:center}
.ba{padding:10px 16px;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:700;flex-shrink:0}
.mos{display:flex;gap:4px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.mos::-webkit-scrollbar{display:none}
.mb{padding:6px 10px;background:rgba(22,32,50,.5);border:1px solid rgba(148,163,184,.08);border-radius:8px;color:#64748b;font-size:11px;font-weight:500;white-space:nowrap}
.mb.on{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.3);color:#f8fafc}
.cd{padding:12px;background:rgba(22,32,50,.5);border-radius:12px;border:1px solid rgba(148,163,184,.06)}
.its{display:flex;flex-direction:column;gap:3px}
.ir{display:flex;align-items:center;gap:8px;padding:9px 10px;background:rgba(22,32,50,.4);border-radius:10px}
.ir .nm{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ir .vl{font-size:13px;font-weight:600;white-space:nowrap}
.ir .dt{font-size:10px;opacity:.35;margin-left:4px}
.ck{background:none;border:none;font-size:17px;color:#64748b;padding:0;flex-shrink:0}
.xb{background:none;border:none;color:#ef4444;font-size:12px;opacity:.5;flex-shrink:0;padding:2px 4px}
.empty{text-align:center;padding:24px 12px;color:#334155;font-size:13px}
.cbl{background:rgba(22,32,50,.5);border-radius:12px;border:1px solid rgba(148,163,184,.06);overflow:hidden}
.ch{display:flex;justify-content:space-between;align-items:center;padding:11px 12px;background:none;border:none;color:#e2e8f0;font-size:13px;font-weight:600;width:100%;text-align:left}
.ch .inf{font-size:11px;opacity:.5}
.ci{display:flex;flex-wrap:wrap;gap:5px;padding:0 10px 10px}
.cp{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;background:rgba(12,18,32,.6);border:1px solid rgba(148,163,184,.1);border-radius:18px;color:#94a3b8;font-size:12px}
.cp.on{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.4);color:#4ade80}
.cdl{background:none;border:none;color:#ef4444;font-size:10px;padding:1px 4px;opacity:.5}
.bg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bc{padding:12px;background:rgba(22,32,50,.6);border:1px solid rgba(148,163,184,.08);border-radius:12px;display:flex;flex-direction:column;gap:8px}
.bc.pd{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.04)}
.bt{display:flex;align-items:center;gap:6px}
.bt .lb{font-weight:600;font-size:13px}
.bt .ico{font-size:20px}
.pb{border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:600;padding:5px 0;text-align:center}
.tbar{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.15);border-radius:12px}
.tbar .l{font-size:12px;opacity:.6}
.tbar .v{font-size:20px;font-weight:700;color:#60a5fa}
.pi{display:flex;align-items:center;gap:8px;font-size:12px;color:#64748b}
.pbg{flex:1;height:4px;background:rgba(148,163,184,.1);border-radius:2px;overflow:hidden}
.pf{height:100%;border-radius:2px;transition:width .3s}
.sph{display:flex;align-items:center;gap:10px;padding:12px;background:rgba(22,32,50,.5);border-radius:12px;border:1px solid rgba(148,163,184,.06)}
.sph h2{font-size:15px}
.sph p{font-size:11px;opacity:.5}
.spt{margin-left:auto;font-size:18px;font-weight:700;color:#f59e0b}
.cs{display:flex;gap:6px}
.cst{flex:1;display:flex;flex-direction:column;gap:2px;padding:10px;text-align:center;background:rgba(22,32,50,.6);border-radius:10px;border:1px solid rgba(148,163,184,.06)}
.cst .l{font-size:10px;opacity:.5}
.cst .v{font-size:16px;font-weight:700}
.nbt{padding:10px;background:rgba(96,165,250,.1);border:1px dashed rgba(96,165,250,.3);border-radius:10px;color:#60a5fa;font-size:13px;font-weight:500}
.fc{padding:12px;background:rgba(22,32,50,.8);border-radius:12px;border:1px solid rgba(148,163,184,.1);display:flex;flex-direction:column;gap:8px}
.pc{padding:12px;background:rgba(22,32,50,.4);border-radius:10px;border:1px solid rgba(148,163,184,.06)}
.ppb{height:4px;background:rgba(148,163,184,.08);border-radius:2px;margin-top:6px;overflow:hidden}
.ppf{height:100%;background:linear-gradient(90deg,#3b82f6,#60a5fa);border-radius:2px;transition:width .3s}
.sv{text-align:right;padding:2px 16px;font-size:10px;color:#22c55e;min-height:14px}
.ld{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.ld .sp{font-size:28px;animation:spin 1.5s infinite linear}
@keyframes spin{to{transform:rotate(360deg)}}
.clr{padding:9px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;color:#f87171;font-size:12px;font-weight:500}
.rc{padding:14px;border-radius:12px;border:1px solid rgba(148,163,184,.06)}
.rc.pos{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.2)}
.rc.neg{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2)}
.rc .rl{font-size:11px;opacity:.6;margin-bottom:4px}
.rc .rv{font-size:24px;font-weight:800}
.rd{font-size:12px;color:#64748b;padding:6px 0;border-bottom:1px solid rgba(148,163,184,.06);display:flex;justify-content:space-between}
.upload-area{border:2px dashed rgba(96,165,250,.3);border-radius:14px;padding:30px 20px;text-align:center;color:#64748b;cursor:pointer}
.upload-area:hover{border-color:#60a5fa;background:rgba(96,165,250,.05)}
.upload-area .big{font-size:36px;margin-bottom:8px}
.upload-area input{display:none}
.upload-status{padding:12px;border-radius:10px;font-size:13px;text-align:center}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600}
.tag-in{background:rgba(34,197,94,.15);color:#4ade80}
.tag-out{background:rgba(239,68,68,.1);color:#f87171}
.tag-pay{background:rgba(245,158,11,.1);color:#f59e0b}
.tag-sal{background:rgba(96,165,250,.15);color:#60a5fa}
/* Dashboard */
.dash-hero{padding:20px 16px;border-radius:14px;text-align:center;position:relative;overflow:hidden}
.dash-hero.pos{background:linear-gradient(135deg,rgba(34,197,94,.12),rgba(34,197,94,.04))}
.dash-hero.neg{background:linear-gradient(135deg,rgba(239,68,68,.12),rgba(239,68,68,.04))}
.dash-hero .lbl{font-size:12px;opacity:.5;margin-bottom:4px}
.dash-hero .big{font-size:32px;font-weight:800}
.dash-hero .sub{font-size:12px;opacity:.6;margin-top:6px}
.dash-row{display:flex;gap:8px}
.dash-box{flex:1;padding:12px;background:rgba(22,32,50,.6);border-radius:12px;border:1px solid rgba(148,163,184,.06);text-align:center}
.dash-box .l{font-size:10px;opacity:.5;margin-bottom:3px}
.dash-box .v{font-size:18px;font-weight:700}
.bar-row{display:flex;align-items:center;gap:8px;padding:8px 0}
.bar-label{font-size:12px;width:90px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-bg{flex:1;height:20px;background:rgba(148,163,184,.06);border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;transition:width .4s;min-width:2px}
.bar-val{font-size:11px;font-weight:600;width:70px;text-align:right;flex-shrink:0}
.dash-section{margin-top:4px}
.dash-section .title{font-size:12px;opacity:.5;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>
<div id="ld" class="ld"><div class="sp">💰</div><div style="color:#475569;font-size:13px">Conectando...</div></div>
<div id="app" class="app" style="display:none">
  <div class="top-bar"><div class="top-row"><h1 class="logo">Controle de Gastos</h1><span id="sync" class="sync" style="color:#f59e0b">🔄</span></div></div>
  <div class="sv" id="svb"></div>
  <div id="pg_dash" class="page show"></div>
  <div id="pg_mercado" class="page"></div>
  <div id="pg_financas" class="page"></div>
  <div id="pg_viagem" class="page"></div>
  <div id="pg_cartao" class="page"></div>
  <div id="pg_emprestimos" class="page"></div>
  <div id="pg_aresta" class="page"></div>
  <div id="pg_pix" class="page"></div>
  <div id="pg_extrato" class="page"></div>
  <div id="pg_receita" class="page"></div>
  <nav class="bnav"><div class="bnav-in" id="ni"></div></nav>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
const FBC={apiKey:"AIzaSyCht-bMPxwbGjUUEtT5wT0oH06tkOxu5LE",authDomain:"controle-gastos-f7b1f.firebaseapp.com",databaseURL:"https://controle-gastos-f7b1f-default-rtdb.firebaseio.com",projectId:"controle-gastos-f7b1f",storageBucket:"controle-gastos-f7b1f.firebasestorage.app",messagingSenderId:"766683047129",appId:"1:766683047129:web:f24f6ee87c5336c1eb0ac8"};
const ML=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const N=new Date(),CM=N.getMonth(),CY=N.getFullYear(),CMK=mk(CY,CM);
function mk(y,m){return`${y}-${String(m).padStart(2,"0")}`}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function mO(r=6){const o=[];for(let i=-r;i<=12;i++){const d=new Date(CY,CM+i);o.push({key:mk(d.getFullYear(),d.getMonth()),label:`${ML[d.getMonth()]} ${d.getFullYear()}`})}return o}
function mI(k){const[y,m]=k.split("-").map(Number);return y*12+m}
const CATS=[
{id:"geladeira",label:"Geladeira/Freezer",icon:"🧊",items:["Peito de Frango","Peixe","Carne","Batata Frita","Pão de Queijo","Salgadinhos","Sorvete","Frios","Manteiga","Creme de Ricota","Cottage","Iogurte","Ovos","Requeijão","Geleia","Ketchup","Maionese","Mostarda"]},
{id:"verduras",label:"Verduras/Frutas",icon:"🥬",items:["Alho","Cebola","Alface","Tomate","Cenoura","Batata","Batata Doce","Abobrinha","Banana","Uva","Morango","Limão","Tangerina","Kiwi","Melão","Manga","Blueberry"]},
{id:"pereciveis",label:"Não Perecíveis",icon:"🫙",items:["Arroz","Feijão","Macarrão","Sal","Açúcar","Farinha de Mandioca","Leite Condensado","Creme de Leite","Molho de Tomate","Batata Palha","Trigo para Kibe","Cuscuz","Tapioca","Chá","Café","Biscoitos","Mel","Milho para Pipoca","Atum","Pães","Azeite","Óleo"]},
{id:"temperos",label:"Temperos",icon:"🌿",items:["Canela","Orégano","Noz Moscada","Pimenta","Coentro","Manjericão","Tomilho","Curry"]},
{id:"bebidas",label:"Bebidas",icon:"🥤",items:["Matte","Refrigerante","Água com Gás","Cerveja","Whisky","Vinho","Leite"]},
{id:"limpeza",label:"Limpeza/Higiene",icon:"🧹",items:["Papel Higiênico","Sabonete","Desodorante","Pasta de Dente","Shampoo","Condicionador","Detergente","Sabão para Roupas","Amaciante","Água Sanitária","Cloro Gel","Lustra Móveis","CIF","Repelente","Inseticida","Desinfetante","Papel Toalha"]},
];
const BLS=[{id:"aluguel",label:"Aluguel",icon:"🏠"},{id:"luz",label:"Luz",icon:"💡"},{id:"condominio",label:"Condomínio",icon:"🏢"},{id:"internet",label:"Internet",icon:"🌐"}];
const VCS=[{id:"passagens",label:"Passagens",icon:"🎫"},{id:"uber",label:"Uber",icon:"🚗"},{id:"adicionais",label:"Adicionais",icon:"📦"}];
const TABS=[
{id:"dash",lb:"Painel",ico:"📊"},{id:"mercado",lb:"Mercado",ico:"🛒"},{id:"financas",lb:"Finanças",ico:"💰"},
{id:"viagem",lb:"SP",ico:"✈️"},{id:"cartao",lb:"Cartão",ico:"💳"},{id:"emprestimos",lb:"Emprest.",ico:"🏦"},
{id:"aresta",lb:"Aresta",ico:"🏢"},{id:"pix",lb:"PIX",ico:"📲"},{id:"extrato",lb:"Extrato",ico:"📄"},{id:"receita",lb:"Receita",ico:"📋"},
];
const DEF={mercado:{lista:[],custom:[]},financas:{},viagem:{},cartao:[],emprestimos:[],aresta:{},pix:{},extrato:{},receita:{}};
let D={...DEF},dbRef=null,curTab="dash";
const ni=document.getElementById("ni");
TABS.forEach(t=>{const b=document.createElement("button");b.className="nb"+(t.id==="dash"?" on":"");b.innerHTML=`<span class="ico">${t.ico}</span>${t.lb}`;b.onclick=()=>{curTab=t.id;ni.querySelectorAll(".nb").forEach(x=>x.classList.remove("on"));b.classList.add("on");document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));document.getElementById("pg_"+t.id).classList.add("show");render()};ni.appendChild(b)});
function initFB(){try{firebase.initializeApp(FBC);dbRef=firebase.database().ref("controle-gastos");dbRef.on("value",s=>{const v=s.val();if(v){D={...DEF,...v};["lista","custom"].forEach(k=>{if(!Array.isArray(D.mercado[k]))D.mercado[k]=[]});["cartao","emprestimos"].forEach(k=>{if(!Array.isArray(D[k]))D[k]=[]});}document.getElementById("ld").style.display="none";document.getElementById("app").style.display="block";render();document.getElementById("sync").innerHTML="🟢";document.getElementById("sync").style.color="#22c55e"})}catch(e){document.getElementById("ld").innerHTML=`<div style="color:#ef4444;padding:20px">Erro: ${e.message}</div>`}}
function sv(){if(dbRef){dbRef.set(D);const b=document.getElementById("svb");b.textContent="● Salvo";setTimeout(()=>b.textContent="",600)}}

// ══════════ HELPERS pra calcular gastos ══════════
function getGastos(moKey){
  const g={};let total=0;
  // Finanças
  const fin=D.financas&&D.financas[moKey]||{};let fT=0;BLS.forEach(b=>{fT+=parseFloat(fin[b.id])||0});if(fT){g["🏠 Casa (contas)"]=fT;total+=fT}
  // Cartão
  const cT=gCM(moKey).reduce((s,i)=>s+i.valorParcela,0);if(cT){g["💳 Cartão"]=cT;total+=cT}
  // Empréstimos
  const eT=gEM(moKey).reduce((s,i)=>s+i.valorParcela,0);if(eT){g["🏦 Empréstimos"]=eT;total+=eT}
  // Viagem
  let vT=0;if(D.viagem&&D.viagem[moKey]&&typeof D.viagem[moKey]==="object")VCS.forEach(c=>{(D.viagem[moKey][c.id]||[]).forEach(i=>vT+=i.valor||0)});if(vT){g["✈️ São Paulo"]=vT;total+=vT}
  // Aresta
  const aT=(D.aresta&&D.aresta[moKey]?D.aresta[moKey].items||[]:[]).reduce((s,i)=>s+(i.valor||0),0);if(aT){g["🏢 Aresta"]=aT;total+=aT}
  // PIX enviados
  const pOut=(D.pix&&D.pix[moKey]?D.pix[moKey].items||[]:[]).filter(i=>i.valor<0).reduce((s,i)=>s+Math.abs(i.valor),0);if(pOut){g["📲 PIX enviados"]=pOut;total+=pOut}
  // Receita extras
  const ext=(D.receita&&D.receita[moKey]?D.receita[moKey].extras||[]:[]).reduce((s,i)=>s+(i.valor||0),0);if(ext){g["📝 Outros gastos"]=ext;total+=ext}
  return{items:g,total};
}
function getReceita(moKey){return parseFloat(D.receita&&D.receita[moKey]?D.receita[moKey].receita:0)||0}

// ══════════ DASHBOARD ══════════
let dashMo=CMK;
function rDash(){
  const e=document.getElementById("pg_dash");let h="";
  h+=`<div class="mos">`;mO().forEach(m=>{h+=`<button class="mb ${dashMo===m.key?"on":""}" onclick="dashMo='${m.key}';render()">${m.label}</button>`});h+=`</div>`;
  const rec=getReceita(dashMo);
  const{items:gastos,total:totalG}=getGastos(dashMo);
  const saldo=rec-totalG;
  const colors=["#3b82f6","#f59e0b","#ef4444","#a78bfa","#22c55e","#ec4899","#06b6d4","#f97316"];

  // Hero
  h+=`<div class="dash-hero ${saldo>=0?"pos":"neg"}">
    <div class="lbl">SALDO DO MÊS</div>
    <div class="big" style="color:${saldo>=0?"#22c55e":"#ef4444"}">R$ ${saldo.toFixed(2)}</div>
    <div class="sub">${rec>0?`Receita R$${rec.toFixed(2)} − Gastos R$${totalG.toFixed(2)}`:"Cadastre sua receita na aba Receita"}</div>
  </div>`;

  // Summary boxes
  h+=`<div class="dash-row">
    <div class="dash-box"><div class="l">💵 RECEITA</div><div class="v" style="color:#22c55e">R$${rec.toFixed(0)}</div></div>
    <div class="dash-box"><div class="l">💸 GASTOS</div><div class="v" style="color:#ef4444">R$${totalG.toFixed(0)}</div></div>
    <div class="dash-box"><div class="l">💰 SOBRA</div><div class="v" style="color:${saldo>=0?"#22c55e":"#ef4444"}">R$${saldo.toFixed(0)}</div></div>
  </div>`;

  // Bar chart
  const entries=Object.entries(gastos).sort((a,b)=>b[1]-a[1]);
  if(entries.length){
    const maxVal=Math.max(...entries.map(e=>e[1]));
    h+=`<div class="cd"><div class="dash-section"><div class="title">📊 Gastos por Categoria</div>`;
    entries.forEach(([label,val],idx)=>{
      const pct=maxVal>0?(val/maxVal)*100:0;
      const color=colors[idx%colors.length];
      const pctTotal=totalG>0?((val/totalG)*100).toFixed(0):0;
      h+=`<div class="bar-row">
        <div class="bar-label">${label.replace(/^.+\s/,"")}</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>

  if(vItems.length){

    h+=`</div></div></div>`;
  }

  // Aresta
  const areItems=(D.aresta&&D.aresta[dashMo]?D.aresta[dashMo].items||[]:[]);
  if(areItems.length){
    h+=`<div class="cd"><div class="dash-section"><div class="title">🏢 Aresta</div><div class="its">`;
    areItems.forEach(i=>{h+=`<div class="ir"><span class="nm">${i.desc}</span><span class="vl" style="color:#f59e0b">R$${(i.valor||0).toFixed(2)}</span></div>`});
    h+=`</div></div></div>`;
  }

  // PIX resumo
  const pixItems=(D.pix&&D.pix[dashMo]?D.pix[dashMo].items||[]:[]);
  if(pixItems.length){
    const pIn=pixItems.filter(i=>i.valor>0).reduce((s,i)=>s+i.valor,0);
    const pOut=pixItems.filter(i=>i.valor<0).reduce((s,i)=>s+Math.abs(i.valor),0);

    </div></div>`;
  }

  if(!entries.length && !finItems.length && !cartM.length)h+=`<div class="empty">Nenhum dado neste mês ainda.<br>Comece adicionando nas outras abas!</div>`;

  e.innerHTML=h;
}

// ══════════ PIX ══════════
let pMo=CMK,pFil="todos";
function rP(){const e=document.getElementById("pg_pix");if(!D.pix)D.pix={};const md=D.pix[pMo]||{items:[]},items=md.items||[];let h="";const receb=items.filter(i=>i.valor>0),env=items.filter(i=>i.valor<0);const tIn=receb.reduce((s,i)=>s+i.valor,0),tOut=env.reduce((s,i)=>s+Math.abs(i.valor),0);h+=`<div class="sph"><span style="font-size:22px">📲</span><div><h2>PIX</h2></div></div><div class="cs"><div class="cst"><span class="l">RECEBIDOS</span><span class="v" style="color:#4ade80">R$${tIn.toFixed(0)}</span></div><div class="cst"><span class="l">ENVIADOS</span><span class="v" style="color:#f87171">R$${tOut.toFixed(0)}</span></div><div class="cst"><span class="l">SALDO</span><span class="v" style="color:${tIn-tOut>=0?"#4ade80":"#f87171"}">R$${(tIn-tOut).toFixed(0)}</span></div></div><div class="mos">`;mO().forEach(m=>{h+=`<button class="mb ${pMo===m.key?"on":""}" onclick="pMo='${m.key}';render()">${m.label}</button>`});h+=`</div><div class="trow"><button class="tb ${pFil==="todos"?"on":""}" onclick="pFil='todos';render()">Todos (${items.length})</button><button class="tb ${pFil==="in"?"on":""}" onclick="pFil='in';render()">Receb. (${receb.length})</button><button class="tb ${pFil==="out"?"on":""}" onclick="pFil='out';render()">Env. (${env.length})</button></div><div class="row"><input class="inp" id="pD" placeholder="Descrição..." style="flex:2" onkeydown="if(event.key==='Enter')aP()"><div class="mw"><span class="sy">R$</span><input type="number" class="inp inp-m" id="pV" placeholder="0 (- envio)" onkeydown="if(event.key==='Enter')aP()"></div><button class="ba" onclick="aP()">+</button></div>`;let fil=items;if(pFil==="in")fil=receb;if(pFil==="out")fil=env;if(!fil.length)h+=`<div class="empty">Nenhum PIX</div>`;else{h+=`<div class="its">`;fil.forEach(i=>{const isIn=i.valor>0;h+=`<div class="ir"><span class="tag ${isIn?"tag-in":"tag-out"}">${isIn?"↓":"↑"}</span><span class="nm">${i.desc}<span class="dt">${i.date||""}</span></span><span class="vl" style="color:${isIn?"#4ade80":"#f87171"}">${isIn?"+":""}R$${Math.abs(i.valor).toFixed(2)}</span><button class="xb" onclick="dP('${i.id}')">✕</button></div>`});h+=`</div>`}e.innerHTML=h}
function aP(){const d=document.getElementById("pD").value.trim(),v=parseFloat(document.getElementById("pV").value);if(!d||isNaN(v))return;if(!D.pix[pMo])D.pix[pMo]={items:[]};if(!D.pix[pMo].items)D.pix[pMo].items=[];D.pix[pMo].items.push({id:gid(),desc:d,valor:v,date:new Date().toLocaleDateString("pt-BR"),manual:true});sv();render()}
function dP(id){if(D.pix[pMo]&&D.pix[pMo].items){D.pix[pMo].items=D.pix[pMo].items.filter(i=>i.id!==id);sv();render()}}

// ══════════ EXTRATO ══════════
let extStatus="",extParsed=[];
function rEx(){const e=document.getElementById("pg_extrato");let h="";h+=`<div class="sph"><span style="font-size:22px">📄</span><div><h2>Importar Extrato</h2><p>Upload do PDF</p></div></div><div class="upload-area" onclick="document.getElementById('pdfInput').click()" ondragover="event.preventDefault()" ondrop="event.preventDefault();handlePDF(event.dataTransfer.files[0])"><div class="big">📎</div><b>Toque aqui ou arraste o PDF</b><br><span style="font-size:12px">Extrato Itaú, Nubank, Inter...</span><input type="file" id="pdfInput" accept=".pdf" onchange="handlePDF(this.files[0])"></div>`;if(extStatus)h+=`<div class="upload-status" style="background:rgba(96,165,250,.1);color:#60a5fa">${extStatus}</div>`;if(extParsed.length){h+=`<div class="cd"><div style="font-size:12px;opacity:.6;margin-bottom:8px">📊 ${extParsed.length} LANÇAMENTOS</div><div class="cs" style="margin-bottom:8px"><div class="cst"><span class="l">PIX</span><span class="v" style="color:#a78bfa">${extParsed.filter(i=>i.cat==="pix").length}</span></div><div class="cst"><span class="l">PAG</span><span class="v" style="color:#f59e0b">${extParsed.filter(i=>i.cat==="pagamento").length}</span></div><div class="cst"><span class="l">SAL</span><span class="v" style="color:#60a5fa">${extParsed.filter(i=>i.cat==="salario").length}</span></div></div><button class="ba" style="width:100%;border-radius:10px;font-size:14px;padding:12px" onclick="importExtrato()">✅ Importar para as abas</button><div style="margin-top:8px;max-height:250px;overflow-y:auto"><div class="its">`;extParsed.forEach(i=>{const isIn=i.valor>0;let tc="tag-pay";if(i.cat==="pix")tc=isIn?"tag-in":"tag-out";if(i.cat==="salario")tc="tag-sal";h+=`<div class="ir"><span class="tag ${tc}">${i.cat==="pix"?"PIX":i.cat==="salario"?"SAL":"PAG"}</span><span class="nm">${i.desc}<span class="dt">${i.date}</span></span><span class="vl" style="color:${isIn?"#4ade80":"#f87171"}">${isIn?"+":""}R$${Math.abs(i.valor).toFixed(2)}</span></div>`});h+=`</div></div></div>`}const hist=(D.extrato&&D.extrato.historico)||[];if(hist.length){h+=`<div class="cd"><div style="font-size:12px;opacity:.6;margin-bottom:6px">📋 HISTÓRICO</div>`;hist.slice(-5).reverse().forEach(i=>{h+=`<div class="rd"><span>${i.label}</span><span>${i.count} itens</span></div>`});h+=`</div>`}e.innerHTML=h}
async function handlePDF(file){if(!file)return;extStatus="⏳ Lendo...";extParsed=[];render();try{const buf=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:buf}).promise;let txt="";for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const tc=await pg.getTextContent();txt+=tc.items.map(x=>x.str).join(" ")+"\n"}extParsed=parseExtrato(txt);extStatus=`✅ ${extParsed.length} lançamentos!`;render()}catch(err){extStatus="❌ Erro: "+err.message;render()}}
function parseExtrato(txt){const items=[];const ft=txt.replace(/\n/g," ");const re=/(\d{2}\/\d{2}\/\d{4})\s+((?:PIX|PAY|RSHOP|RSCSS|SISPAG|CREDIARIO|REMUNERACAO|FATURA|SEGURO|ON SMART|SAQUE|PAG BOL|TBI|REND PAGO|DEV PIX|ITAU SEG)[^\d-]*?)\s*(-?[\d.]+,\d{2})/g;let m;while(m=re.exec(ft)){const date=m[1];let desc=m[2].trim();let valor=parseFloat(m[3].replace(/\./g,"").replace(",","."));if(desc.includes("SALDO DO DIA"))continue;let cat="outros";if(/PIX|DEV PIX/.test(desc))cat="pix";else if(/REMUNERACAO|SALARIO|SISPAG/.test(desc))cat="salario";else if(/PAY |RSHOP|RSCSS|ON SMART|SAQUE|PAG BOL/.test(desc))cat="pagamento";desc=desc.replace(/\d{2}\/\d{2}\s*$/,"").trim();items.push({id:gid(),date,desc,valor,cat})}const seen=new Set();return items.filter(i=>{const k=i.date+i.desc+i.valor;if(seen.has(k))return false;seen.add(k);return true})}
function importExtrato(){if(!extParsed.length)return;const fd=extParsed[0]?.date;let moKey=CMK;if(fd){const[d,m,y]=fd.split("/").map(Number);moKey=mk(y,m-1)}const pixI=extParsed.filter(i=>i.cat==="pix");if(pixI.length){if(!D.pix[moKey])D.pix[moKey]={items:[]};if(!D.pix[moKey].items)D.pix[moKey].items=[];const ex=new Set(D.pix[moKey].items.map(i=>i.desc+i.valor));pixI.forEach(i=>{const k=i.desc+i.valor;if(!ex.has(k)){D.pix[moKey].items.push({id:gid(),desc:i.desc,valor:i.valor,date:i.date,imported:true});ex.add(k)}})}if(!D.extrato)D.extrato={};if(!D.extrato.historico)D.extrato.historico=[];D.extrato.historico.push({label:new Date().toLocaleDateString("pt-BR")+" - "+moKey,count:extParsed.length,date:new Date().toISOString()});if(!D.extrato.dados)D.extrato.dados={};D.extrato.dados[moKey]=extParsed;sv();extStatus="✅ Importado! Confira na aba PIX.";extParsed=[];render()}

// ══════════ RECEITA ══════════
let rMo=CMK;
function rR(){const e=document.getElementById("pg_receita");if(!D.receita)D.receita={};const md=D.receita[rMo]||{};let h="";h+=`<div class="mos">`;mO().forEach(m=>{h+=`<button class="mb ${rMo===m.key?"on":""}" onclick="rMo='${m.key}';render()">${m.label}</button>`});h+=`</div>`;const rec=md.receita||"";h+=`<div class="cd"><div style="font-size:12px;opacity:.6;margin-bottom:6px">💵 RECEITA</div><div class="mw"><span class="sy">R$</span><input type="number" class="inp inp-m" placeholder="Receita..." value="${rec}" onchange="sRv(this.value)" style="font-size:18px;font-weight:700"></div></div>`;const recVal=parseFloat(rec)||0;const{items:gastos,total:totalG}=getGastos(rMo);const saldo=recVal-totalG;h+=`<div class="rc ${saldo>=0?"pos":"neg"}"><div class="rl">SALDO</div><div class="rv" style="color:${saldo>=0?"#22c55e":"#ef4444"}">R$ ${saldo.toFixed(2)}</div></div><div class="cd"><div style="font-size:12px;opacity:.6;margin-bottom:8px">DETALHAMENTO</div><div class="rd"><span>💵 Receita</span><span style="color:#22c55e;font-weight:600">+R$${recVal.toFixed(2)}</span></div>`;Object.entries(gastos).forEach(([k,v])=>{h+=`<div class="rd"><span>${k}</span><span style="color:#ef4444;font-weight:600">-R$${v.toFixed(2)}</span></div>`});h+=`<div style="display:flex;justify-content:space-between;padding:8px 0;font-weight:700;font-size:14px"><span>Saldo</span><span style="color:${saldo>=0?"#22c55e":"#ef4444"}">R$${saldo.toFixed(2)}</span></div></div>`;h+=`<div class="cd"><div style="font-size:12px;opacity:.6;margin-bottom:6px">📝 OUTROS GASTOS</div><div class="row" style="margin-bottom:6px"><input class="inp" id="rED" placeholder="Descrição..." style="flex:2" onkeydown="if(event.key==='Enter')aRE()"><div class="mw"><span class="sy">R$</span><input type="number" class="inp inp-m" id="rEV" placeholder="0" onkeydown="if(event.key==='Enter')aRE()"></div><button class="ba" onclick="aRE()">+</button></div>`;const extras=md.extras||[];if(extras.length){h+=`<div class="its">`;extras.forEach(i=>{h+=`<div class="ir"><span class="nm">${i.desc}</span><span class="vl" style="color:#f59e0b">R$${(i.valor||0).toFixed(2)}</span><button class="xb" onclick="dRE('${i.id}')">✕</button></div>`});h+=`</div>`}h+=`</div>`;e.innerHTML=h}
function sRv(v){if(!D.receita[rMo])D.receita[rMo]={};D.receita[rMo].receita=v;sv();render()}
function aRE(){const d=document.getElementById("rED").value.trim(),v=parseFloat(document.getElementById("rEV").value)||0;if(!d)return;if(!D.receita[rMo])D.receita[rMo]={};if(!D.receita[rMo].extras)D.receita[rMo].extras=[];D.receita[rMo].extras.push({id:gid(),desc:d,valor:v});sv();render()}
function dRE(id){if(D.receita[rMo]&&D.receita[rMo].extras){D.receita[rMo].extras=D.receita[rMo].extras.filter(i=>i.id!==id);sv();render()}}

// ══════════ RENDER ══════════
function render(){({dash:rDash,mercado:rM,financas:rF,viagem:rV,cartao:rC,emprestimos:rE,aresta:rA,pix:rP,extrato:rEx,receita:rR})[curTab]?.()}
initFB();
</script>
</body>
</html>
