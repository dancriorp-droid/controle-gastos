<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Controle de Gastos</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c1220">
<style>
*{margin:0;padding:0;box-sizing:border-box}html{font-size:16px;-webkit-text-size-adjust:100%}body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:#0c1220;color:#e2e8f0;min-height:100dvh;-webkit-tap-highlight-color:transparent;overflow-x:hidden}input,button,select{font-family:inherit;font-size:16px}input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}button{cursor:pointer}
.app{max-width:540px;margin:0 auto;padding-bottom:30px}
.top-bar{position:sticky;top:0;z-index:20;background:#0c1220;padding:14px 16px 10px;border-bottom:1px solid rgba(148,163,184,.08)}
.logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sync{font-size:11px;margin-left:auto}
.top-row{display:flex;align-items:center;gap:8px}
/* Back button */
.back-btn{background:none;border:none;color:#60a5fa;font-size:15px;font-weight:600;padding:8px 0;display:flex;align-items:center;gap:6px}
/* Home grid */
.home-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:16px}
.home-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:20px 8px;background:rgba(22,32,50,.6);border:1px solid rgba(148,163,184,.08);border-radius:16px;color:#e2e8f0;font-size:13px;font-weight:600;text-align:center;transition:all .15s;min-height:100px}
.home-btn:hover,.home-btn:active{background:rgba(96,165,250,.1);border-color:rgba(96,165,250,.3)}
.home-btn .ico{font-size:32px}
.home-btn .sub{font-size:10px;color:#64748b;font-weight:400;margin-top:-4px}
/* Pages */
.page{display:none;flex-direction:column;gap:10px;padding:6px 16px 30px}.page.show{display:flex}
.trow{display:flex;gap:8px;flex-wrap:wrap}
.tb{flex:1;padding:12px 10px;background:rgba(22,32,50,.8);border:1px solid rgba(148,163,184,.1);border-radius:12px;color:#64748b;font-size:14px;font-weight:500;text-align:center;min-width:0}
.tb.on{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.3);color:#f8fafc}
.inp{width:100%;padding:12px 14px;background:rgba(12,18,32,.7);border:1px solid rgba(148,163,184,.1);border-radius:12px;color:#f8fafc;font-size:16px;outline:none}
.inp:focus{border-color:rgba(96,165,250,.4)}
.inp-m{padding-left:34px}
.mw{position:relative;flex:1}.mw .sy{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#475569;font-size:15px;font-weight:600;pointer-events:none}
.row{display:flex;gap:8px;align-items:center}
.ba{padding:12px 20px;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:12px;color:#fff;font-size:18px;font-weight:700;flex-shrink:0}
.mos{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}.mos::-webkit-scrollbar{display:none}
.mb{padding:8px 14px;background:rgba(22,32,50,.5);border:1px solid rgba(148,163,184,.08);border-radius:10px;color:#64748b;font-size:13px;font-weight:500;white-space:nowrap}
.mb.on{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.3);color:#f8fafc}
.cd{padding:14px;background:rgba(22,32,50,.5);border-radius:14px;border:1px solid rgba(148,163,184,.06)}
.its{display:flex;flex-direction:column;gap:4px}
.ir{display:flex;align-items:center;gap:10px;padding:12px;background:rgba(22,32,50,.4);border-radius:12px}
.ir .nm{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ir .vl{font-size:14px;font-weight:600;white-space:nowrap}
.ir .dt{font-size:10px;opacity:.35;margin-left:4px}
.ck{background:none;border:none;font-size:22px;color:#64748b;padding:0;flex-shrink:0}
.xb{background:none;border:none;color:#ef4444;font-size:16px;opacity:.5;flex-shrink:0;padding:4px 6px}
.empty{text-align:center;padding:30px 16px;color:#334155;font-size:14px}
.cbl{background:rgba(22,32,50,.5);border-radius:14px;border:1px solid rgba(148,163,184,.06);overflow:hidden}
.ch{display:flex;justify-content:space-between;align-items:center;padding:14px;background:none;border:none;color:#e2e8f0;font-size:14px;font-weight:600;width:100%;text-align:left}
.ch .inf{font-size:12px;opacity:.5}
.ci{display:flex;flex-wrap:wrap;gap:6px;padding:0 12px 12px}
.cp{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;background:rgba(12,18,32,.6);border:1px solid rgba(148,163,184,.1);border-radius:20px;color:#94a3b8;font-size:14px}
.cp.on{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.4);color:#4ade80}
.cdl{background:none;border:none;color:#ef4444;font-size:12px;padding:2px 6px;opacity:.5}
.bg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bc{padding:14px;background:rgba(22,32,50,.6);border:1px solid rgba(148,163,184,.08);border-radius:14px;display:flex;flex-direction:column;gap:10px}
.bc.pd{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.04)}
.bt{display:flex;align-items:center;gap:8px}.bt .lb{font-weight:600;font-size:14px}.bt .ico{font-size:22px}
.pb{border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:600;padding:8px 0;text-align:center}
.tbar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.15);border-radius:14px}
.tbar .l{font-size:13px;opacity:.6}.tbar .v{font-size:22px;font-weight:700;color:#60a5fa}
.pi{display:flex;align-items:center;gap:8px;font-size:13px;color:#64748b}
.pbg{flex:1;height:5px;background:rgba(148,163,184,.1);border-radius:3px;overflow:hidden}
.pfl{height:100%;border-radius:3px;transition:width .3s}
.sph{display:flex;align-items:center;gap:12px;padding:14px;background:rgba(22,32,50,.5);border-radius:14px;border:1px solid rgba(148,163,184,.06)}
.sph h2{font-size:16px}.sph p{font-size:12px;opacity:.5}
.spt{margin-left:auto;font-size:18px;font-weight:700;color:#f59e0b}
.cs{display:flex;gap:8px}
.cst{flex:1;display:flex;flex-direction:column;gap:3px;padding:12px;text-align:center;background:rgba(22,32,50,.6);border-radius:12px;border:1px solid rgba(148,163,184,.06)}
.cst .l{font-size:11px;opacity:.5}.cst .v{font-size:18px;font-weight:700}
.nbt{padding:14px;background:rgba(96,165,250,.1);border:1px dashed rgba(96,165,250,.3);border-radius:12px;color:#60a5fa;font-size:15px;font-weight:500}
.fc{padding:14px;background:rgba(22,32,50,.8);border-radius:14px;border:1px solid rgba(148,163,184,.1);display:flex;flex-direction:column;gap:10px}
.pc{padding:14px;background:rgba(22,32,50,.4);border-radius:12px;border:1px solid rgba(148,163,184,.06)}
.ppb{height:5px;background:rgba(148,163,184,.08);border-radius:3px;margin-top:8px;overflow:hidden}
.ppf{height:100%;background:linear-gradient(90deg,#3b82f6,#60a5fa);border-radius:3px;transition:width .3s}
.sv{text-align:right;padding:2px 16px;font-size:10px;color:#22c55e;min-height:14px}
.ld{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.ld .sp{font-size:28px;animation:spin 1.5s infinite linear}@keyframes spin{to{transform:rotate(360deg)}}
.clr{padding:12px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:12px;color:#f87171;font-size:14px;font-weight:500}
.rc{padding:16px;border-radius:14px;border:1px solid rgba(148,163,184,.06)}.rc.pos{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.2)}.rc.neg{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2)}.rc .rl{font-size:12px;opacity:.6;margin-bottom:4px}.rc .rv{font-size:26px;font-weight:800}
.rd{font-size:13px;color:#64748b;padding:8px 0;border-bottom:1px solid rgba(148,163,184,.06);display:flex;justify-content:space-between}
.upload-area{border:2px dashed rgba(96,165,250,.3);border-radius:16px;padding:28px 16px;text-align:center;color:#64748b;cursor:pointer}.upload-area:hover{border-color:#60a5fa;background:rgba(96,165,250,.05)}.upload-area .big{font-size:32px;margin-bottom:8px}.upload-area input{display:none}.upload-status{padding:12px;border-radius:12px;font-size:13px;text-align:center}
.tag{display:inline-block;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600}.tag-in{background:rgba(34,197,94,.15);color:#4ade80}.tag-out{background:rgba(239,68,68,.1);color:#f87171}.tag-pay{background:rgba(245,158,11,.1);color:#f59e0b}.tag-sal{background:rgba(96,165,250,.15);color:#60a5fa}
.dash-hero{padding:20px 16px;border-radius:16px;text-align:center}.dash-hero.pos{background:linear-gradient(135deg,rgba(34,197,94,.12),rgba(34,197,94,.04))}.dash-hero.neg{background:linear-gradient(135deg,rgba(239,68,68,.12),rgba(239,68,68,.04))}.dash-hero .lbl{font-size:13px;opacity:.5;margin-bottom:4px}.dash-hero .big{font-size:30px;font-weight:800}.dash-hero .sub{font-size:12px;opacity:.6;margin-top:6px}
.dash-row{display:flex;gap:8px}.dash-box{flex:1;padding:12px;background:rgba(22,32,50,.6);border-radius:12px;border:1px solid rgba(148,163,184,.06);text-align:center}.dash-box .l{font-size:10px;opacity:.5;margin-bottom:3px}.dash-box .v{font-size:17px;font-weight:700}
.bar-row{display:flex;align-items:center;gap:8px;padding:6px 0}.bar-label{font-size:12px;width:75px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bar-bg{flex:1;height:18px;background:rgba(148,163,184,.06);border-radius:6px;overflow:hidden}.bar-fill{height:100%;border-radius:6px;transition:width .4s;min-width:2px}.bar-val{font-size:11px;font-weight:600;width:65px;text-align:right;flex-shrink:0}
.dash-section{margin-top:4px}.dash-section .title{font-size:12px;opacity:.5;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>
<div id="ld" class="ld"><div class="sp">💰</div><div style="color:#475569;font-size:13px">Conectando...</div></div>
<div id="app" class="app" style="display:none">
<div class="top-bar"><div class="top-row"><h1 class="logo">Controle de Gastos</h1><span id="sync" class="sync" style="color:#f59e0b">🔄</span></div></div>
<div class="sv" id="svb"></div>
<div id="pg_home" class="page show"></div>
<div id="pg_dash" class="page"></div><div id="pg_salarios" class="page"></div><div id="pg_mercado" class="page"></div><div id="pg_financas" class="page"></div><div id="pg_viagem" class="page"></div><div id="pg_cartao" class="page"></div><div id="pg_emprestimos" class="page"></div><div id="pg_aresta" class="page"></div><div id="pg_pix" class="page"></div><div id="pg_extrato" class="page"></div><div id="pg_receita" class="page"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
const FBC={apiKey:"AIzaSyCht-bMPxwbGjUUEtT5wT0oH06tkOxu5LE",authDomain:"controle-gastos-f7b1f.firebaseapp.com",databaseURL:"https://controle-gastos-f7b1f-default-rtdb.firebaseio.com",projectId:"controle-gastos-f7b1f",storageBucket:"controle-gastos-f7b1f.firebasestorage.app",messagingSenderId:"766683047129",appId:"1:766683047129:web:f24f6ee87c5336c1eb0ac8"};
const ML=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const N=new Date(),CM=N.getMonth(),CY=N.getFullYear(),CMK=mk(CY,CM);
function mk(y,m){return`${y}-${String(m).padStart(2,"0")}`}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function mO(r=6){const o=[];for(let i=-r;i<=12;i++){const d=new Date(CY,CM+i);o.push({key:mk(d.getFullYear(),d.getMonth()),label:`${ML[d.getMonth()]} ${d.getFullYear()}`})}return o}
function mI(k){const[y,m]=k.split("-").map(Number);return y*12+m}
const CATS=[{id:"geladeira",label:"Geladeira/Freezer",icon:"🧊",items:["Peito de Frango","Peixe","Carne","Batata Frita","Pão de Queijo","Salgadinhos","Sorvete","Frios","Manteiga","Creme de Ricota","Cottage","Iogurte","Ovos","Requeijão","Geleia","Ketchup","Maionese","Mostarda"]},{id:"verduras",label:"Verduras/Frutas",icon:"🥬",items:["Alho","Cebola","Alface","Tomate","Cenoura","Batata","Batata Doce","Abobrinha","Banana","Uva","Morango","Limão","Tangerina","Kiwi","Melão","Manga","Blueberry"]},{id:"pereciveis",label:"Não Perecíveis",icon:"🫙",items:["Arroz","Feijão","Macarrão","Sal","Açúcar","Farinha de Mandioca","Leite Condensado","Creme de Leite","Molho de Tomate","Batata Palha","Trigo para Kibe","Cuscuz","Tapioca","Chá","Café","Biscoitos","Mel","Milho para Pipoca","Atum","Pães","Azeite","Óleo"]},{id:"temperos",label:"Temperos",icon:"🌿",items:["Canela","Orégano","Noz Moscada","Pimenta","Coentro","Manjericão","Tomilho","Curry"]},{id:"bebidas",label:"Bebidas",icon:"🥤",items:["Matte","Refrigerante","Água com Gás","Cerveja","Whisky","Vinho","Leite"]},{id:"limpeza",label:"Limpeza/Higiene",icon:"🧹",items:["Papel Higiênico","Sabonete","Desodorante","Pasta de Dente","Shampoo","Condicionador","Detergente","Sabão para Roupas","Amaciante","Água Sanitária","Cloro Gel","Lustra Móveis","CIF","Repelente","Inseticida","Desinfetante","Papel Toalha"]}];
const BLS=[{id:"aluguel",label:"Aluguel",icon:"🏠"},{id:"luz",label:"Luz",icon:"💡"},{id:"condominio",label:"Condomínio",icon:"🏢"},{id:"internet",label:"Internet",icon:"🌐"}];
const VCS=[{id:"passagens",label:"Passagens",icon:"🎫"},{id:"uber",label:"Uber",icon:"🚗"},{id:"adicionais",label:"Adicionais",icon:"📦"}];
const MENU=[{id:"dash",lb:"Painel",ico:"📊",sub:"Visão geral"},{id:"salarios",lb:"Salários",ico:"💵",sub:"Entradas"},{id:"mercado",lb:"Mercado",ico:"🛒",sub:"Lista compras"},{id:"financas",lb:"Finanças",ico:"💰",sub:"Contas da casa"},{id:"viagem",lb:"Transportes",ico:"🚗",sub:"Uber, passagens"},{id:"cartao",lb:"Cartão",ico:"💳",sub:"Parceladas"},{id:"emprestimos",lb:"Empréstimos",ico:"🏦",sub:"Parcelas"},{id:"aresta",lb:"Aresta",ico:"🏢",sub:"Investimentos"},{id:"pix",lb:"PIX",ico:"📲",sub:"Transferências"},{id:"extrato",lb:"Extrato",ico:"📄",sub:"Importar PDF"},{id:"receita",lb:"Receita",ico:"📋",sub:"Saldo mensal"}];
const DEF={mercado:{lista:[],custom:[]},financas:{},viagem:{},cartao:[],emprestimos:[],aresta:{},pix:{},extrato:{},receita:{},salarios:{}};
let D={...DEF},dbRef=null,curTab="home";

function goTo(id){curTab=id;document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));document.getElementById("pg_"+id).classList.add("show");render()}
function goHome(){goTo("home")}

function initFB(){try{firebase.initializeApp(FBC);dbRef=firebase.database().ref("controle-gastos");dbRef.on("value",s=>{const v=s.val();if(v){D={...DEF,...v};["lista","custom"].forEach(k=>{if(!Array.isArray(D.mercado[k]))D.mercado[k]=[]});["cartao","emprestimos"].forEach(k=>{if(!Array.isArray(D[k]))D[k]=[]});}document.getElementById("ld").style.display="none";document.getElementById("app").style.display="block";render();document.getElementById("sync").innerHTML="🟢";document.getElementById("sync").style.color="#22c55e"})}catch(e){document.getElementById("ld").innerHTML=`<div style="color:#ef4444;padding:20px">Erro: ${e.message}</div>`}}
function sv(){if(dbRef){dbRef.set(D);const b=document.getElementById("svb");b.textContent="● Salvo";setTimeout(()=>b.textContent="",600)}}
function backBtn(){return`<button class="back-btn" onclick="goHome()">← Voltar</button>`}
function getTotalSalarios(mo){return(D.salarios&&D.salarios[mo]?D.salarios[mo].items||[]:[]).reduce((a,i)=>a+(i.valor||0),0)}
function getGastos(mo){const g={};let t=0;const fin=D.financas&&D.financas[mo]||{};let fT=0;BLS.forEach(b=>{fT+=parseFloat(fin[b.id])||0});if(fT){g["🏠 Casa"]=fT;t+=fT}const cT=gCM(mo).reduce((s,i)=>s+i.valorParcela,0);if(cT){g["💳 Cartão"]=cT;t+=cT}const eT=gEM(mo).reduce((s,i)=>s+i.valorParcela,0);if(eT){g["🏦 Empréstimos"]=eT;t+=eT}let vT=0;if(D.viagem&&D.viagem[mo]&&typeof D.viagem[mo]==="object")VCS.forEach(c=>{(D.viagem[mo][c.id]||[]).forEach(i=>vT+=i.valor||0)});if(vT){g["🚗 Transp."]=vT;t+=vT}const aT=(D.aresta&&D.aresta[mo]?D.aresta[mo].items||[]:[]).reduce((s,i)=>s+(i.valor||0),0);if(aT){g["🏢 Aresta"]=aT;t+=aT}const pO=(D.pix&&D.pix[mo]?D.pix[mo].items||[]:[]).filter(i=>i.valor<0).reduce((s,i)=>s+Math.abs(i.valor),0);if(pO){g["📲 PIX"]=pO;t+=pO}const ext=(D.receita&&D.receita[mo]?D.receita[mo].extras||[]:[]).reduce((s,i)=>s+(i.valor||0),0);if(ext){g["📝 Outros"]=ext;t+=ext}return{items:g,total:t}}

// ══ HOME ══
function rHome(){const e=document.getElementById("pg_home");const rec=getTotalSalarios(CMK),{total:tG}=getGastos(CMK),sal=rec-tG;
let h=`<div class="dash-hero ${sal>=0?"pos":"neg"}"><div class="lbl">SALDO DE ${ML[CM]} ${CY}</div><div class="big" style="color:${sal>=0?"#22c55e":"#ef4444"}">R$ ${sal.toFixed(2)}</div><div class="sub">${rec>0?`Entradas R$${rec.toFixed(0)} − Gastos R$${tG.toFixed(0)}`:"Cadastre seus salários"}</div></div>`;
h+=`<div class="home-grid">`;MENU.forEach(m=>{h+=`<button class="home-btn" onclick="goTo('${m.id}')"><span class="ico">${m.ico}</span>${m.lb}<span class="sub">${m.sub}</span></button>`});h+=`</div>`;e.innerHTML=h}

// ══ SALÁRIOS ══
let salMo=CMK;
function rSal(){const e=document.getElementById("pg_salarios");if(!D.salarios)D.salarios={};const items=(D.salarios[salMo]||{items:[]}).items||[];let h=backBtn();
h+=`<div class="sph"><span style="font-size:24px">💵</span><div><h2>Salários / Entradas</h2></div><div class="spt" style="color:#4ade80">R$${items.reduce((s,i)=>s+(i.valor||0),0).toFixed(2)}</div></div>`;
h+=`<div class="mos">`;mO().forEach(m=>{h+=`<button class="mb ${salMo===m.key?"on":""}" onclick="salMo='${m.key}';render()">${m.label}</button>`});h+=`</div>`;
h+=`<div class="row"><input class="inp" id="salD" placeholder="Ex: Salário, Freelance..." style="flex:2" onkeydown="if(event.key==='Enter')aSal()"><div class="mw"><span class="sy">R$</span><input type="number" class="inp inp-m" id="salV" placeholder="0" onkeydown="if(event.key==='Enter')aSal()"></div><button class="ba" onclick="aSal()">+</button></div>`;
if(!items.length)h+=`<div class="empty">Nenhuma entrada</div>`;
else{h+=`<div class="its">`;items.forEach(i=>{h+=`<div class="ir"><span class="tag tag-in">💵</span><span class="nm">${i.desc}</span><span class="vl" style="color:#4ade80">R$${(i.valor||0).toFixed(2)}</span><button class="xb" onclick="dSal('${i.id}')">✕</button></div>`});h+=`</div><div class="tbar"><span class="l">TOTAL</span><span class="v" style="color:#4ade80">R$${items.reduce((s,i)=>s+(i.valor||0),0).toFixed(2)}</span></div>`}
e.innerHTML=h}
function aSal(){const d=document.getElementById("salD").value.trim(),v=parseFloat(document.getElementById("salV").value)||0;if(!d||!v)return;if(!D.salarios[salMo])D.salarios[salMo]={items:[]};if(!D.salarios[salMo].items)D.salarios[salMo].items=[];D.salarios[salMo].items.push({id:gid(),desc:d,valor:v,date:new Date().toLocaleDateString("pt-BR")});sv();render()}
function dSal(id){if(D.salarios[salMo]&&D.salarios[salMo].items){D.salarios[salMo].items=D.salarios[salMo].items.filter(i=>i.id!==id);sv();render()}}

// ══ DASHBOARD ══
let dashMo=CMK;

async function handlePDF(file){if(!file)return;extStatus="⏳ Lendo...";extParsed=[];render();try{const buf=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:buf}).promise;let t="";for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const tc=await pg.getTextContent();const ls={};tc.items.forEach(it=>{const y=Math.round(it.transform[5]);if(!ls[y])ls[y]=[];ls[y].push({x:it.transform[4],text:it.str})});Object.keys(ls).sort((a,b)=>b-a).forEach(y=>{t+=ls[y].sort((a,b)=>a.x-b.x).map(i=>i.text).join(" ")+"\n"})}extParsed=parseExtrato(t);extStatus=`✅ ${extParsed.length} lançamentos!`;render()}catch(err){extStatus="❌ "+err.message;render()}}
function parseExtrato(txt){const items=[];txt.split("\n").forEach(raw=>{const line=raw.trim();if(!line)return;const dm=line.match(/^(\d{2}\/\d{2}\/\d{4})\s+(.+)/);if(!dm)return;if(dm[2].includes("SALDO DO DIA"))return;const vals=[...dm[2].matchAll(/(-?[\d.]+,\d{2})(?:\s|$)/g)];if(!vals.length)return;const lv=vals[vals.length-1];const desc=dm[2].substring(0,lv.index).trim();if(!desc||desc.includes("período"))return;const valor=parseFloat(lv[1].replace(/\./g,"").replace(",","."));if(isNaN(valor))return;let cat="outros";if(/PIX|DEV PIX/i.test(desc))cat="pix";else if(/REMUNERACAO|SALARIO|SISPAG/i.test(desc))cat="salario";else if(/PAY |RSHOP|RSCSS|ON SMART|SAQUE|PAG BOL/i.test(desc))cat="pagamento";items.push({id:gid(),date:dm[1],desc:desc.substring(0,60),valor,cat})});const seen=new Set();return items.filter(i=>{const k=i.date+i.desc+i.valor;if(seen.has(k))return false;seen.add(k);return true})}
function importExtrato(){if(!extParsed.length)return;const fd=extParsed[0]?.date;let mo=CMK;if(fd){const[d,m,y]=fd.split("/").map(Number);mo=mk(y,m-1)}const px=extParsed.filter(i=>i.cat==="pix");if(px.length){if(!D.pix[mo])D.pix[mo]={items:[]};if(!D.pix[mo].items)D.pix[mo].items=[];const ex=new Set(D.pix[mo].items.map(i=>i.desc+i.valor));px.forEach(i=>{if(!ex.has(i.desc+i.valor)){D.pix[mo].items.push({id:gid(),desc:i.desc,valor:i.valor,date:i.date,imported:true});ex.add(i.desc+i.valor)}})}if(!D.extrato)D.extrato={};if(!D.extrato.historico)D.extrato.historico=[];D.extrato.historico.push({label:"Extrato "+mo,count:extParsed.length});sv();extStatus=`✅ ${px.length} PIX importados!`;extParsed=[];render()}
async function handleFatura(file){if(!file)return;fatStatus="⏳ Lendo fatura...";fatParsed=[];render();try{const buf=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:buf}).promise;let t="";for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const tc=await pg.getTextContent();const ls={};tc.items.forEach(it=>{const y=Math.round(it.transform[5]);if(!ls[y])ls[y]=[];ls[y].push({x:it.transform[4],text:it.str})});Object.keys(ls).sort((a,b)=>b-a).forEach(y=>{t+=ls[y].sort((a,b)=>a.x-b.x).map(i=>i.text).join(" ")+"\n"})}fatParsed=parseFatura(t);const ub=fatParsed.filter(i=>i.cat==="uber");fatStatus=`✅ ${ub.length} Uber + ${fatParsed.length-ub.length} parceladas!`;render()}catch(err){fatStatus="❌ "+err.message;render()}}
function parseFatura(txt){const items=[];const skip=["Lançamentos no cartão","Total dos lançamentos","LIVIA G","DATA ","Próxima fatura","Demais faturas","Total para","Limite ","Juros ","Multa ","IOF ","CET ","Total a pagar","Valor ","SAÚDE","VESTUÁRIO","VEÍCULOS","DIVERSOS","ALIMENTAÇÃO","MORADIA","EDUCAÇÃO","TURISMO","Compras parceladas","Encargos","Simulação","Novo teto","Pague sua","Com seguro","Sem seguro"];let inSk=false;for(const raw of txt.split("\n")){const line=raw.trim();if(!line)continue;if(["Compras parceladas","Limites de crédito","Encargos cobrados","Simulação"].some(s=>line.includes(s))){inSk=true}if(inSk){if(line.includes("Lançamentos:")&&line.includes("compras"))inSk=false;continue}if(skip.some(w=>line.includes(w)))continue;const dps=[...raw.matchAll(/\b(\d{2}\/\d{2})\b/g)].map(m=>({pos:m.index,end:m.index+5,date:m[1]}));for(const{end:se,date}of dps){const rest=raw.substring(se);const vm=rest.match(/^(.+?)(-?\s*[\d.]+,\d{2})/);if(!vm)continue;let desc=vm[1].trim();const vs=vm[2].replace(/\s/g,"");if(!desc||desc.length<3)continue;const valor=parseFloat(vs.replace(/\./g,"").replace(",","."));if(isNaN(valor))continue;const isUber=/uber|DL\s*\*|UBER\*/i.test(desc);const pm=desc.match(/(\d{2})\/(\d{2})$/);if(!isUber&&!pm)continue;items.push({id:gid(),date,desc:desc.substring(0,50),valor,cat:isUber?"uber":"parcelada",parcela:pm?`${pm[1]}/${pm[2]}`:null})}}const seen=new Set();return items.filter(i=>{const k=i.date+i.desc+i.valor;if(seen.has(k))return false;seen.add(k);return true})}
function importFatura(){if(!fatParsed.length)return;const uber=fatParsed.filter(i=>i.cat==="uber"),parc=fatParsed.filter(i=>i.cat==="parcelada");if(uber.length){const mo=CMK;if(!D.viagem[mo])D.viagem[mo]={};if(!D.viagem[mo].uber)D.viagem[mo].uber=[];const ex=new Set(D.viagem[mo].uber.map(i=>i.desc+i.valor));uber.forEach(i=>{if(!ex.has(i.desc+i.valor)){D.viagem[mo].uber.push({id:gid(),desc:i.desc,valor:i.valor,date:i.date});ex.add(i.desc+i.valor)}})}if(parc.length){const ex=new Set(D.cartao.map(i=>i.desc+i.valorParcela));parc.forEach(i=>{if(!i.parcela)return;const[cur,tot]=i.parcela.split("/").map(Number);if(!cur||!tot||cur>tot)return;const desc=i.desc.replace(/\s*\d{2}\/\d{2}$/,"").trim();if(ex.has(desc+i.valor))return;const sd=new Date(CY,CM-(cur-1));D.cartao.push({id:gid(),desc,total:i.valor*tot,parcelas:tot,valorParcela:i.valor,startMonth:mk(sd.getFullYear(),sd.getMonth()),date:i.date,imported:true});ex.add(desc+i.valor)})}if(!D.extrato)D.extrato={};if(!D.extrato.historico)D.extrato.historico=[];D.extrato.historico.push({label:"Fatura "+new Date().toLocaleDateString("pt-BR"),count:fatParsed.length});sv();fatStatus=`✅ Importado!`;fatParsed=[];render()}
// ══ RECEITA ══
let rMo=CMK;
function rR(){const e=document.getElementById("pg_receita");if(!D.receita)D.receita={};const md=D.receita[rMo]||{};let h=backBtn();h+=`<div class="mos">`;mO().forEach(m=>{h+=`<button class="mb ${rMo===m.key?"on":""}" onclick="rMo='${m.key}';render()">${m.label}</button>`});h+=`</div>`;
const recVal=getTotalSalarios(rMo),{items:gastos,total:totalG}=getGastos(rMo),saldo=recVal-totalG;
h+=`<div class="rc ${saldo>=0?"pos":"neg"}"><div class="rl">SALDO DO MÊS</div><div class="rv" style="color:${saldo>=0?"#22c55e":"#ef4444"}">R$ ${saldo.toFixed(2)}</div></div>`;
h+=`<div class="cd"><div style="font-size:12px;opacity:.6;margin-bottom:8px">DETALHAMENTO</div><div class="rd"><span>💵 Entradas</span><span style="color:#22c55e;font-weight:600">+R$${recVal.toFixed(2)}</span></div>`;Object.entries(gastos).forEach(([k,v])=>{h+=`<div class="rd"><span>${k}</span><span style="color:#ef4444;font-weight:600">-R$${v.toFixed(2)}</span></div>`});h+=`<div style="display:flex;justify-content:space-between;padding:10px 0;font-weight:700;font-size:15px"><span>Saldo</span><span style="color:${saldo>=0?"#22c55e":"#ef4444"}">R$${saldo.toFixed(2)}</span></div></div>`;
h+=`<div class="cd"><div style="font-size:12px;opacity:.6;margin-bottom:8px">📝 OUTROS GASTOS</div><div class="row" style="margin-bottom:8px"><input class="inp" id="rED" placeholder="Descrição..." style="flex:2" onkeydown="if(event.key==='Enter')aRE()"><div class="mw"><span class="sy">R$</span><input type="number" class="inp inp-m" id="rEV" placeholder="0" onkeydown="if(event.key==='Enter')aRE()"></div><button class="ba" onclick="aRE()">+</button></div>`;const extras=md.extras||[];if(extras.length){h+=`<div class="its">`;extras.forEach(i=>{h+=`<div class="ir"><span class="nm">${i.desc}</span><span class="vl" style="color:#f59e0b">R$${(i.valor||0).toFixed(2)}</span><button class="xb" onclick="dRE('${i.id}')">✕</button></div>`});h+=`</div>`}h+=`</div>`;e.innerHTML=h}
function aRE(){const d=document.getElementById("rED").value.trim(),v=parseFloat(document.getElementById("rEV").value)||0;if(!d)return;if(!D.receita[rMo])D.receita[rMo]={};if(!D.receita[rMo].extras)D.receita[rMo].extras=[];D.receita[rMo].extras.push({id:gid(),desc:d,valor:v});sv();render()}
function dRE(id){if(D.receita[rMo]&&D.receita[rMo].extras){D.receita[rMo].extras=D.receita[rMo].extras.filter(i=>i.id!==id);sv();render()}}
// ══ RENDER ══
function render(){({home:rHome,dash:rDash,salarios:rSal,mercado:rM,financas:rF,viagem:rV,cartao:rC,emprestimos:rE,aresta:rA,pix:rP,extrato:rEx,receita:rR})[curTab]?.()}
initFB();
